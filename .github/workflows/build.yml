name: Build Custom Android Clang (LLVM - ARM64 Host)

on:
  workflow_dispatch:
    inputs:
      llvm_commit:
        description: 'Specific LLVM Commit Hash (from android.googlesource.com/toolchain/llvm-project)'
        required: true
        default: '37f38d1f3276b62fba09462ab4807dce846c732d'
      targets:
        description: 'LLVM Target Architectures (semicolon-separated)'
        required: true
        default: 'AArch64;ARM'
      enable_lto:
        description: 'Enable LTO for the stage-2 compiler'
        type: boolean
        required: false
        default: false

jobs:
  build-clang-arm64:
    # Runs natively on GitHub's 64-bit ARM runner infrastructure
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Optimize Runner Disk Space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Clean up default virtual environment applications not required for C++ builds
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            bison \
            flex \
            texinfo \
            pkg-config \
            libxml2-dev \
            libssl-dev \
            zlib1g-dev \
            libzstd-dev \
            liblzma-dev \
            python3 \
            python3-pip \
            unzip \
            curl \
            git

      - name: Setup Java JRE/JDK (Required for SDK Manager)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Layout & Sync Android Build Scripts
        run: |
          # Safely clear any residual workspace from previous runs (fixes git exit code 128)
          rm -rf workspace
          mkdir -p workspace/toolchain
          
          # Clone only the main branch of Google's llvm_android repository
          git clone \
            --branch main \
            --single-branch \
            --depth 1 \
            https://android.googlesource.com/toolchain/llvm_android \
            workspace/toolchain/llvm_android

      - name: Inject Custom Linux-ARM64 Google Prebuilts via Git Clone
        working-directory: workspace
        run: |
          # 1. Sparse Clone the Clang Prebuilts repo to fetch only the clang-r596125 directory
          echo "=== Cloning Clang-r596125 (ARM64) ==="
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            --branch mirror-goog-main-llvm-toolchain-source \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-arm64 \
            prebuilts/clang/host/linux-arm64
          
          (cd prebuilts/clang/host/linux-arm64 && git sparse-checkout set clang-r596125)

          # 2. Shallow Clone CMake (ARM64)
          echo "=== Cloning CMake (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-prebuilts \
            https://android.googlesource.com/platform/prebuilts/cmake/linux-arm64 \
            prebuilts/cmake/linux-arm64

          # 3. Shallow Clone Python (ARM64)
          echo "=== Cloning Python (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-llvm-toolchain-source \
            https://android.googlesource.com/platform/prebuilts/python/linux-arm64 \
            prebuilts/python/linux-arm64

          # 4. Shallow Clone Ninja (ARM64)
          echo "=== Cloning Ninja (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-prebuilts \
            https://android.googlesource.com/platform/prebuilts/ninja/linux-arm64 \
            prebuilts/ninja/linux-arm64

      - name: Create Compatibility Symlinks & Hermetic Path wrappers
        working-directory: workspace
        run: |
          echo "=== Setting up prebuilts architecture fallback symlinks ==="
          # Point linux-x86 requests natively to the linux-arm64 prebuilt folders we cloned
          # Clear any existing directories first to ensure symlinks are clean (not nested)
          mkdir -p prebuilts/clang/host
          rm -rf prebuilts/clang/host/linux-x86
          ln -sf linux-arm64 prebuilts/clang/host/linux-x86
          
          rm -rf prebuilts/cmake/linux-x86
          ln -sf linux-arm64 prebuilts/cmake/linux-x86
          
          rm -rf prebuilts/python/linux-x86
          ln -sf linux-arm64 prebuilts/python/linux-x86
          
          rm -rf prebuilts/ninja/linux-x86
          ln -sf linux-arm64 prebuilts/ninja/linux-x86

          echo "=== Generating Mock Hermetic Build-Tools for python3 and shell utilities ==="
          # Creates simulated hermetic folders so that get_host_tag() finds native system utilities
          mkdir -p prebuilts/build-tools/path/linux-x86
          mkdir -p prebuilts/build-tools/path/linux-arm64
          
          # Temporarily disable exit-on-error (set -e) because command -v/which can return non-zero for missing tools
          set +e
          for tool in python3 python awk cat cp sed touch uname tar zip unzip make bison flex m4 ninja cmake clang lld; do
            TOOL_PATH=$(command -v "$tool")
            if [ -n "$TOOL_PATH" ]; then
              ln -sf "$TOOL_PATH" prebuilts/build-tools/path/linux-x86/$tool
              ln -sf "$TOOL_PATH" prebuilts/build-tools/path/linux-arm64/$tool
            fi
          done
          set -e

          echo "=== Generating Hermetic CMAKE_MAKE_PROGRAM / Ninja paths ==="
          # This specifically fixes the missing CMAKE_MAKE_PROGRAM ninja executable paths
          # It symlinks the host native ninja directly into the target directories
          for dir in prebuilts/build-tools/linux_musl-x86/bin prebuilts/build-tools/linux-x86/bin prebuilts/build-tools/linux-arm64/bin prebuilts/build-tools/linux_musl-arm64/bin; do
            mkdir -p "$dir"
            set +e
            for tool in ninja cmake python3 python bison flex m4; do
              TOOL_PATH=$(command -v "$tool")
              if [ -n "$TOOL_PATH" ]; then
                ln -sf "$TOOL_PATH" "$dir/$tool"
              fi
            done
            set -e
          done

      - name: Inject AOSP Dependency Repositories & Sysroot
        working-directory: workspace
        run: |
          # 1. Clone lightweight external mirrors for zstd, libxml2, and toolchain-utils [1, 2]
          echo "=== Cloning External Dependencies ==="
          mkdir -p external
          git clone --depth 1 https://android.googlesource.com/platform/external/zstd external/zstd
          git clone --depth 1 https://android.googlesource.com/platform/external/libxml2 external/libxml2
          git clone --depth 1 https://android.googlesource.com/platform/external/toolchain-utils external/toolchain-utils
          
          # 2. Redirect expected glibc sysroot compile queries directly to the native host sysroot
          echo "=== Setting up Native Sysroot Redirection ==="
          mkdir -p prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8
          rm -rf prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/sysroot
          ln -sf / prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/sysroot

      - name: Inject NDK r29 & Platform SDK 35 via SDK Manager
        working-directory: workspace
        run: |
          # 1. Bootstrap official Android SDK Command Line Tools
          echo "=== Bootstrapping Android SDK command line tools ==="
          mkdir -p android-sdk/cmdline-tools
          
          curl -L "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d android-sdk/cmdline-tools
          mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
          rm cmdline-tools.zip
          
          # Expose sdkmanager variables
          export ANDROID_HOME=$(pwd)/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          
          # Automatically accept SDK licenses
          echo "=== Accepting Licenses ==="
          yes | sdkmanager --licenses --sdk_root=$ANDROID_HOME
          
          # 2. Download exact Platform SDK 35 and NDK r29 (29.0.14206865)
          echo "=== Installing packages via sdkmanager ==="
          sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "ndk;29.0.14206865"
          
          # 3. Restructure and map to expected AOSP paths
          echo "=== Mapping NDK to AOSP prebuilts directory ==="
          mkdir -p prebuilts/ndk
          mv android-sdk/ndk/29.0.14206865 prebuilts/ndk/r29
          
          # Ensure target directory structure exists cleanly
          echo "=== Mapping SDK 35 to AOSP prebuilts directory ==="
          mkdir -p prebuilts/sdk/35/public
          cp android-sdk/platforms/android-35/android.jar prebuilts/sdk/35/public/android.jar

      - name: Patch Build Scripts for Custom Versions
        working-directory: workspace
        run: |
          # Python sweeps the scripts and replaces compile values dynamically
          echo "=== Patching bootstrap clang version to clang-r596125 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'CLANG_PREBUILT_VERSION' in content:
                          print(f'Patching CLANG_PREBUILT_VERSION in {path}')
                          content = re.sub(r'CLANG_PREBUILT_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'CLANG_PREBUILT_VERSION = \"clang-r596125\"', content)
                          content = re.sub(r'CLANG_PREBUILT_VERSION\s*:\s*str\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'CLANG_PREBUILT_VERSION: str = \"clang-r596125\"', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

          echo "=== Patching NDK version to r29 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'NDK_VERSION' in content:
                          print(f'Patching NDK_VERSION in {path}')
                          content = re.sub(r'NDK_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'NDK_VERSION = \"r29\"', content)
                          content = re.sub(r'NDK_VERSION\s*:\s*str\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'NDK_VERSION: str = \"r29\"', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

          echo "=== Patching SDK version to 35 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'SDK_VERSION' in content or 'PLATFORM_SDK_VERSION' in content:
                          print(f'Patching SDK_VERSION in {path}')
                          content = re.sub(r'SDK_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'SDK_VERSION = \"35\"', content)
                          content = re.sub(r'SDK_VERSION\s*=\s*[0-9]+', 'SDK_VERSION = 35', content)
                          content = re.sub(r'PLATFORM_SDK_VERSION\s*=\s*[0-9]+', 'PLATFORM_SDK_VERSION = 35', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

      - name: Inject Custom LLVM Source Git Repo
        working-directory: workspace
        run: |
          echo "=== Initializing LLVM-Project Repo ==="
          mkdir -p toolchain/llvm-project
          cd toolchain/llvm-project
          git init
          
          # Link the Google source remote
          git remote add origin https://android.googlesource.com/toolchain/llvm-project
          
          # Fetch only the single specified commit (depth 1) to conserve CI storage
          echo "=== Fetching specified commit: ${{ github.event.inputs.llvm_commit }} ==="
          git fetch --depth 1 origin ${{ github.event.inputs.llvm_commit }}
          git checkout FETCH_HEAD

      - name: Compile Custom Android Clang Toolchain (ARM64 Host)
        working-directory: workspace
        run: |
          # Both --skip-source-setup and --skip-apply-patches are OMITTED.
          # This triggers do_build.py to run the default source setup and apply 
          # all of Google's critical Android patches on top of your checked-out commit.
          BUILD_FLAGS="--no-build windows --skip-tests"
          if [ "${{ github.event.inputs.enable_lto }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --lto"
          fi
          
          # Run compilation using the native configuration parameters
          python3 toolchain/llvm_android/build.py $BUILD_FLAGS

      - name: Locate, Strip, and Package the Toolchain
        id: packager
        working-directory: workspace
        run: |
          # Dynamically locate outputs
          BUILD_OUT=$(find out/install -name "clang-dev" -type d | head -n 1)
          if [ -z "$BUILD_OUT" ]; then
            BUILD_OUT=$(find out -name "stage2-install" -type d | head -n 1)
          fi
          
          if [ -z "$BUILD_OUT" ]; then
            echo "::error::Could not find build stage2 binaries."
            exit 1
          fi
          
          echo "Located build output directory at: $BUILD_OUT"
          
          # Strip symbols to trim binary footprint size
          find "$BUILD_OUT/bin" "$BUILD_OUT/lib" -type f \( -name "clang*" -o -name "*.so" -o -name "*.a" \) -exec strip --strip-unneeded {} + 2>/dev/null || true
          
          # Package final tarball
          ARCHIVE_NAME="android-clang-arm64-custom-${{ github.event.inputs.llvm_commit }}.tar.xz"
          tar -cJf "$ARCHIVE_NAME" -C "$(dirname "$BUILD_OUT")" "$(basename "$BUILD_OUT")"
          
          # Safely register variables into the step's GITHUB_OUTPUT context
          echo "archive_path=$(pwd)/$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Built Toolchain Archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.packager.outputs.archive_name }}
          path: ${{ steps.packager.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 14
