name: Build Custom Android Clang (LLVM - ARM64 Host)

on:
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'Upstream LLVM Release Version (e.g., 19.1.0, 22.1.6)'
        required: true
        default: '19.1.0'
      targets:
        description: 'LLVM Target Architectures (semicolon-separated)'
        required: true
        default: 'AArch64;ARM'
      enable_lto:
        description: 'Enable LTO for the stage-2 compiler'
        type: boolean
        required: false
        default: false

jobs:
  build-clang-arm64:
    # Executes on GitHub's native ARM64 runner infrastructure
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Optimize Runner Disk Space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Strip unnecessary virtual environment software
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            bison \
            flex \
            texinfo \
            pkg-config \
            libxml2-dev \
            libssl-dev \
            zlib1g-dev \
            libzstd-dev \
            liblzma-dev \
            python3 \
            python3-pip \
            unzip \
            curl \
            git

      - name: Setup Layout & Sync Android Build Scripts
        run: |
          # Recreate the exact ARM64 AOSP directory layout structure
          mkdir -p workspace/toolchain
          mkdir -p workspace/prebuilts/clang/host/linux-arm64
          mkdir -p workspace/prebuilts/cmake/linux-arm64
          mkdir -p workspace/prebuilts/python/linux-arm64
          mkdir -p workspace/prebuilts/ninja/linux-arm64
          mkdir -p workspace/prebuilts/ndk
          mkdir -p workspace/prebuilts/sdk
          
          # Clone only the main branch of Google's llvm_android repository
          git clone \
            --branch main \
            --single-branch \
            --depth 1 \
            https://android.googlesource.com/toolchain/llvm_android \
            workspace/toolchain/llvm_android

      - name: Setup Layout & Sync Android Build Scripts
        run: |
          # Recreate layout directories (git clone will populate the actual targets)
          mkdir -p workspace/toolchain
          mkdir -p workspace/prebuilts
          
          # Clone ONLY the main branch of Google's llvm_android repository
          git clone \
            --branch main \
            --single-branch \
            --depth 1 \
            https://android.googlesource.com/toolchain/llvm_android \
            workspace/toolchain/llvm_android

      - name: Inject Custom Linux-ARM64 Google Prebuilts via Git Clone
        working-directory: workspace
        run: |
          # 1. Sparse Clone the Clang Prebuilt Repo to only pull clang-r596125
          echo "=== Cloning Clang-r596125 (ARM64) ==="
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            --branch mirror-goog-main-llvm-toolchain-source \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-arm64 \
            prebuilts/clang/host/linux-arm64
          
          cd prebuilts/clang/host/linux-arm64
          git sparse-checkout set clang-r596125
          cd ../../../..

          # 2. Shallow Clone CMake (ARM64)
          echo "=== Cloning CMake (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-prebuilts \
            https://android.googlesource.com/platform/prebuilts/cmake/linux-arm64 \
            prebuilts/cmake/linux-arm64

          # 3. Shallow Clone Python (ARM64)
          echo "=== Cloning Python (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-llvm-toolchain-source \
            https://android.googlesource.com/platform/prebuilts/python/linux-arm64 \
            prebuilts/python/linux-arm64

          # 4. Shallow Clone Ninja (ARM64)
          echo "=== Cloning Ninja (ARM64) ==="
          git clone \
            --depth 1 \
            --branch mirror-goog-main-prebuilts \
            https://android.googlesource.com/platform/prebuilts/ninja/linux-arm64 \
            prebuilts/ninja/linux-arm64

      - name: Inject NDK r29 & Platform SDK 35 via Git Clone
        working-directory: workspace
        run: |
          # 1. Sparse Clone the massive SDK repository to only download SDK 35 files
          echo "=== Cloning Platform SDK 35 ==="
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            --branch main \
            https://android.googlesource.com/platform/prebuilts/sdk \
            prebuilts/sdk
          
          cd prebuilts/sdk
          git sparse-checkout set 35
          cd ../..

          # 2. Download and unpack official NDK r29
          echo "=== Downloading NDK r29 ==="
          curl -L "https://dl.google.com/android/repository/android-ndk-r29-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          mkdir -p prebuilts/ndk
          mv android-ndk-* prebuilts/ndk/r29
          rm ndk.zip

      - name: Inject NDK r29 & Platform SDK 35
        working-directory: workspace
        run: |
          # Fetch official SDK 35 platform structures
          echo "=== Fetching Platform SDK 35 ==="
          mkdir -p prebuilts/sdk/35
          curl -L "https://android.googlesource.com/platform/prebuilts/sdk/+archive/refs/heads/main/35.tar.gz" -o sdk35.tar.gz
          tar -xzf sdk35.tar.gz -C prebuilts/sdk/35
          rm sdk35.tar.gz

          # Fetch official NDK r29
          echo "=== Fetching NDK r29 ==="
          curl -L "https://dl.google.com/android/repository/android-ndk-r29-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          mv android-ndk-* prebuilts/ndk/r29
          rm ndk.zip

      - name: Patch Build Scripts for Custom Versions
        working-directory: workspace
        run: |
          # Python scripts dynamically trace and alter variables within the build directory
          echo "=== Patching bootstrap clang version to clang-r596125 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'CLANG_PREBUILT_VERSION' in content:
                          print(f'Patching CLANG_PREBUILT_VERSION in {path}')
                          content = re.sub(r'CLANG_PREBUILT_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'CLANG_PREBUILT_VERSION = \"clang-r596125\"', content)
                          content = re.sub(r'CLANG_PREBUILT_VERSION\s*:\s*str\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'CLANG_PREBUILT_VERSION: str = \"clang-r596125\"', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

          echo "=== Patching NDK version to r29 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'NDK_VERSION' in content:
                          print(f'Patching NDK_VERSION in {path}')
                          content = re.sub(r'NDK_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'NDK_VERSION = \"r29\"', content)
                          content = re.sub(r'NDK_VERSION\s*:\s*str\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'NDK_VERSION: str = \"r29\"', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

          echo "=== Patching SDK version to 35 ==="
          python3 -c "
          import os, re
          for root, dirs, files in os.walk('toolchain/llvm_android'):
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      with open(path, 'r') as fh:
                          content = fh.read()
                      if 'SDK_VERSION' in content or 'PLATFORM_SDK_VERSION' in content:
                          print(f'Patching SDK_VERSION in {path}')
                          content = re.sub(r'SDK_VERSION\s*=\s*[\'\" ][^\'\"]+[\'\"]', 'SDK_VERSION = \"35\"', content)
                          content = re.sub(r'SDK_VERSION\s*=\s*[0-9]+', 'SDK_VERSION = 35', content)
                          content = re.sub(r'PLATFORM_SDK_VERSION\s*=\s*[0-9]+', 'PLATFORM_SDK_VERSION = 35', content)
                          with open(path, 'w') as fh:
                              fh.write(content)
          "

      - name: Inject Upstream LLVM Source Tarball
        working-directory: workspace
        run: |
          mkdir -p toolchain/llvm-project
          echo "Downloading LLVM Source version: ${{ github.event.inputs.llvm_version }}"
          curl -L "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ github.event.inputs.llvm_version }}/llvm-project-${{ github.event.inputs.llvm_version }}.src.tar.xz" | tar -xJ --strip-components=1 -C toolchain/llvm-project

      - name: Compile Custom Android Clang Toolchain (ARM64 Host)
        working-directory: workspace
        run: |
          # Build target parameters defined for maximum speed and minimum storage space
          BUILD_FLAGS="--no-update --no-build windows --skip-tests"
          if [ "${{ github.event.inputs.enable_lto }}" = "true" ]; then
            BUILD_FLAGS="$BUILD_FLAGS --lto"
          fi
          
          # Execute compile targeting specified runtime ABIs
          python3 toolchain/llvm_android/build.py $BUILD_FLAGS

      - name: Locate, Strip, and Package the Toolchain
        id: packager
        working-directory: workspace
        run: |
          # Dynamically locate outputs
          BUILD_OUT=$(find out/install -name "clang-dev" -type d | head -n 1)
          if [ -z "$BUILD_OUT" ]; then
            BUILD_OUT=$(find out -name "stage2-install" -type d | head -n 1)
          fi
          
          if [ -z "$BUILD_OUT" ]; then
            echo "::error::Could not find build stage2 binaries."
            exit 1
          fi
          
          echo "Located build output directory at: $BUILD_OUT"
          
          # Strip symbols to trim binary footprint size
          find "$BUILD_OUT/bin" "$BUILD_OUT/lib" -type f \( -name "clang*" -o -name "*.so" -o -name "*.a" \) -exec strip --strip-unneeded {} + 2>/dev/null || true
          
          # Package final tarball
          ARCHIVE_NAME="android-clang-arm64-custom-${{ github.event.inputs.llvm_version }}.tar.xz"
          tar -cJf "$ARCHIVE_NAME" -C "$(dirname "$BUILD_OUT")" "$(basename "$BUILD_OUT")"
          
          # Set output variables securely using GITHUB_OUTPUT
          echo "archive_path=$(pwd)/$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Built Toolchain Archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.packager.outputs.archive_name }}
          path: ${{ steps.packager.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 14

